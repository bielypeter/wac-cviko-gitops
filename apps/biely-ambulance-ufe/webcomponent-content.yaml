apiVersion: polyfea.github.io/v1alpha1
kind: WebComponent
metadata:
  name: biely-ambulance-ufe-content
spec:
  microFrontend: biely-ambulance-ufe
  element: biely-ambulance-wl-app
  attributes:
    - name: api-base
      value: http://localhost:30081/api
    - name: ambulance-id
      value: bobulova

  displayRules:
    - allOf:
      - context-name: main-content
      - path: "^(\\.?/)?biely-ambulance-wl(/.*)?$"