apiVersion: apps/v1
kind: Deployment
metadata:
  name: biely-ambulance-ufe-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
        pod: biely-ambulance-ufe-label
  template:                   
    metadata:
      labels:
        pod: biely-ambulance-ufe-label   
    spec:
      containers:
      - name: ambulance-ufe-container
        image: peterbiely/ambulance-ufe
        imagePullPolicy: Always

        ports:
        - name: http
          containerPort: 8080 

        resources:
            requests:
                memory: "32M"
                cpu: "0.1"
            limits:
                memory: "320M"
                cpu: "0.3"